<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Smoggy Sky -->
  <rect width="200" height="200" fill="#CBD5E1"/>
  <!-- Polluted Background -->
  <circle cx="160" cy="40" r="20" fill="#F97316" opacity="0.2"/>
  <path d="M0 200C40 180 60 190 100 200C140 180 160 190 200 200V200H0V200Z" fill="#71717A"/>
  <!-- Masked Boy -->
  <circle cx="100" cy="110" r="40" fill="#FFD29D"/> <!-- Face -->
  <circle cx="85" cy="100" r="4" fill="#1E293B"/> <!-- Eye L -->
  <circle cx="115" cy="100" r="4" fill="#1E293B"/> <!-- Eye R -->
  <!-- Mask -->
  <rect x="75" y="115" width="50" height="30" rx="8" fill="white" stroke="#E2E8F0"/>
  <line x1="75" y1="125" x2="65" y2="120" stroke="white" stroke-width="2"/>
  <line x1="125" y1="125" x2="135" y2="120" stroke="white" stroke-width="2"/>
  <path d="M60 150C60 150 100 130 140 150V200H60V150Z" fill="#F97316"/> <!-- Shirt -->
</svg>
